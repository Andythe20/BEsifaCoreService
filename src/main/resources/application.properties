spring.application.name=core-sifa

# ============================================
# PROFILES
# ============================================
spring.profiles.active=dev
#spring.profiles.active=prod

# ============================================
# CONFIGURACION DE BASE DE DATOS (MySQL)
# ============================================
# Conexion a la base de datos
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&defaultAuthenticationPlugin=caching_sha2_password
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA (Hibernate) Configuration
# ============================================
# Mostrar SQL en consola (util para debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Generar esquema automaticamente
spring.jpa.hibernate.ddl-auto=update

# Dialecto de MySQL
#spring.jpa.database-platform=org.hibernate.dialect.MySQL8D


# Archivo de log
logging.file.name=logs/core-sifa.log
logging.file.path=logs/

# ============================================
# SPRING BOOT CONFIGURATION
# ============================================
# Context path de la aplicacion
server.port=${SERVER_PORT}

# Configuracion de Jackson (JSON)
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=America/Santiago

# ============================================
# SECURITY Configuration (si usas Spring Security)
# ============================================
# Configuracion de BCrypt (fuerza de encriptacion)
spring.security.password.encoding.bcrypt.strength=${BCRYPT_STRENGTH}

# Habilitar logs de acceso HTTP para ver quien hace las peticiones
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.pattern=%h %l %u %t "%r" %s %b "%{User-Agent}i"

# ============================================
# AWS S3 Configuration
# ============================================
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}
aws.s3.region=${AWS_S3_REGION}


# Limite de tamaño por archivo (la app móvil comprime a máximo 5MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB

# ============================================
# SWAGGER / OPENAPI CONFIGURATION
# ============================================
springdoc.api-docs.path=/v3/api-docs
# Deshabilitamos la UI interna ya que el API Gateway centralizará la visualización
springdoc.swagger-ui.enabled=false
